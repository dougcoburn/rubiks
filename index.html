<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Cube • dougcoburn</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;display=swap');
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: #eee;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h1 {
            font-size: 2.5rem;
            margin: 10px 0 5px;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4, #45b7d1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }
        
        .cube-wrapper {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            margin-bottom: 30px;
        }
        
        .cube-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            max-width: 820px;
            margin: 0 auto;
        }
        
        .face {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .face-label {
            font-size: 13px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        
        .stickers {
            display: grid;
            grid-template-columns: repeat(3, 58px);
            gap: 5px;
            background: #222;
            padding: 8px;
            border-radius: 12px;
            box-shadow: inset 0 0 0 3px #333;
        }
        
        .sticker {
            width: 58px;
            height: 58px;
            border-radius: 6px;
            border: 3px solid #111;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4);
        }
        
        .sticker:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.5);
        }
        
        .sticker:active {
            transform: scale(0.95);
        }
        
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        button {
            background: #2a2a4a;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        button:hover {
            background: #3a3a5a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        
        .primary {
            background: linear-gradient(90deg, #4ecdc4, #45b7d1);
            color: #111;
            font-weight: 700;
        }
        
        .status {
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }
        
        footer {
            margin-top: auto;
            font-size: 12px;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>🟥 Rubik's Cube</h1>
    <p class="subtitle">Interactive 3×3 simulator • Click any face or use the controls</p>
    
    <div class="cube-wrapper">
        <div class="cube-container" id="cube"></div>
    </div>
    
    <div class="controls">
        <button onclick="scramble()" class="primary">🎲 Scramble</button>
        <button onclick="resetCube()">Reset</button>
        
        <div style="width: 20px;"></div>
        
        <button onclick="rotateFace('U')">U</button>
        <button onclick="rotateFace('U', true)">U'</button>
        <button onclick="rotateFace('D')">D</button>
        <button onclick="rotateFace('D', true)">D'</button>
        
        <div style="width: 20px;"></div>
        
        <button onclick="rotateFace('L')">L</button>
        <button onclick="rotateFace('L', true)">L'</button>
        <button onclick="rotateFace('R')">R</button>
        <button onclick="rotateFace('R', true)">R'</button>
        
        <div style="width: 20px;"></div>
        
        <button onclick="rotateFace('F')">F</button>
        <button onclick="rotateFace('F', true)">F'</button>
        <button onclick="rotateFace('B')">B</button>
        <button onclick="rotateFace('B', true)">B'</button>
    </div>
    
    <div class="status" id="status">Ready to solve • 20-move scramble takes ~1.6 seconds</div>
    
    <footer>
        Hosted on GitHub Pages • <a href="https://github.com/dougcoburn/rubiks" style="color:#666">dougcoburn/rubiks</a>
    </footer>

    <script>
        const COLORS = ['#ffffff', '#f1c40f', '#e74c3c', '#e67e22', '#3498db', '#27ae60'];
        let cube = {
            U: [0,0,0,0,0,0,0,0,0],
            D: [1,1,1,1,1,1,1,1,1],
            L: [5,5,5,5,5,5,5,5,5],
            R: [4,4,4,4,4,4,4,4,4],
            F: [2,2,2,2,2,2,2,2,2],
            B: [3,3,3,3,3,3,3,3,3]
        };
        let isScrambling = false;

        function createFace(faceName, label) {
            const wrapper = document.createElement('div');
            wrapper.className = 'face';
            
            const labelEl = document.createElement('div');
            labelEl.className = 'face-label';
            labelEl.textContent = label;
            
            const grid = document.createElement('div');
            grid.className = 'stickers';
            
            for (let i = 0; i < 9; i++) {
                const sticker = document.createElement('div');
                sticker.className = 'sticker';
                sticker.dataset.face = faceName;
                sticker.dataset.index = i;
                sticker.onclick = () => {
                    if (!isScrambling) rotateFace(faceName);
                };
                grid.appendChild(sticker);
            }
            
            wrapper.appendChild(labelEl);
            wrapper.appendChild(grid);
            return wrapper;
        }

        function updateCube() {
            const container = document.getElementById('cube');
            container.innerHTML = '';
            
            const faceOrder = [
                {name: 'U', label: '⬆️ U (White)'},
                {name: 'L', label: '⬅️ L (Green)'},
                {name: 'F', label: '⬇️ F (Red)'},
                {name: 'R', label: '➡️ R (Blue)'},
                {name: 'B', label: '🔄 B (Orange)'},
                {name: 'D', label: '⬇️ D (Yellow)'}
            ];
            
            faceOrder.forEach(({name, label}) => {
                const faceEl = createFace(name, label);
                container.appendChild(faceEl);
                
                const stickers = faceEl.querySelectorAll('.sticker');
                stickers.forEach((sticker, i) => {
                    sticker.style.backgroundColor = COLORS[cube[name][i]];
                });
            });
        }

        function rotateFace(face, prime = false) {
            if (isScrambling) return;
            
            const c = cube[face];
            const temp = [...c];
            
            if (!prime) {
                // clockwise
                c[0] = temp[6]; c[1] = temp[3]; c[2] = temp[0];
                c[3] = temp[7]; c[4] = temp[4]; c[5] = temp[1];
                c[6] = temp[8]; c[7] = temp[5]; c[8] = temp[2];
            } else {
                // counter-clockwise
                c[0] = temp[2]; c[1] = temp[5]; c[2] = temp[8];
                c[3] = temp[1]; c[4] = temp[4]; c[5] = temp[7];
                c[6] = temp[0]; c[7] = temp[3]; c[8] = temp[6];
            }
            
            updateCube();
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function scramble() {
            if (isScrambling) return;
            isScrambling = true;
            document.getElementById('status').textContent = 'Scrambling...';
            
            const faces = ['U', 'D', 'L', 'R', 'F', 'B'];
            
            for (let i = 0; i < 20; i++) {
                const face = faces[Math.floor(Math.random() * 6)];
                const prime = Math.random() > 0.5;
                rotateFace(face, prime);
                await sleep(80); // smooth animation
            }
            
            isScrambling = false;
            document.getElementById('status').textContent = 'Scrambled! Try solving it →';
        }

        function resetCube() {
            if (isScrambling) return;
            
            cube = {
                U: [0,0,0,0,0,0,0,0,0],
                D: [1,1,1,1,1,1,1,1,1],
                L: [5,5,5,5,5,5,5,5,5],
                R: [4,4,4,4,4,4,4,4,4],
                F: [2,2,2,2,2,2,2,2,2],
                B: [3,3,3,3,3,3,3,3,3]
            };
            updateCube();
            document.getElementById('status').textContent = 'Cube reset to solved state';
            
            setTimeout(() => {
                document.getElementById('status').textContent = 'Ready to solve • Click Scramble';
            }, 1500);
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            if (isScrambling) return;
            
            const keyMap = {
                'u': () => rotateFace('U'),
                'U': () => rotateFace('U', true),
                'd': () => rotateFace('D'),
                'D': () => rotateFace('D', true),
                'l': () => rotateFace('L'),
                'L': () => rotateFace('L', true),
                'r': () => rotateFace('R'),
                'R': () => rotateFace('R', true),
                'f': () => rotateFace('F'),
                'F': () => rotateFace('F', true),
                'b': () => rotateFace('B'),
                'B': () => rotateFace('B', true),
                's': () => scramble(),
                'r': () => resetCube()
            };
            
            if (keyMap[e.key]) {
                e.preventDefault();
                keyMap[e.key]();
            }
        });

        // Initialize everything
        window.onload = () => {
            updateCube();
            document.getElementById('status').textContent = 'Ready • Press S to scramble or click buttons';
            
            // Easter egg: click title to scramble
            document.querySelector('h1').onclick = () => {
                if (!isScrambling) scramble();
            };
        };
    </script>
</body>
</html>
