<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Cube • dougcoburn</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0f23, #1a1a2e);
            font-family: 'Inter', system-ui, sans-serif;
            color: #eee;
        }
        #container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(17, 17, 34, 0.95);
            padding: 15px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            user-select: none;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        button {
            background: #2a2a4a;
            color: white;
            border: none;
            padding: 10px 18px;
            margin: 4px;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #3a3a5a; transform: translateY(-1px); }
        .primary { background: linear-gradient(90deg, #4ecdc4, #45b7d1); color: #111; font-weight: 700; }
        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div class="ui">
        <h1>🟥🟧 Rubik's Cube</h1>
        <div style="display:flex;flex-wrap:wrap;gap:6px;max-width:380px;">
            <button onclick="rotateLayer('U')" class="primary">U</button>
            <button onclick="rotateLayer('U', true)">U'</button>
            <button onclick="rotateLayer('D')">D</button>
            <button onclick="rotateLayer('D', true)">D'</button>
            <button onclick="rotateLayer('L')">L</button>
            <button onclick="rotateLayer('L', true)">L'</button>
            <button onclick="rotateLayer('R')">R</button>
            <button onclick="rotateLayer('R', true)">R'</button>
            <button onclick="rotateLayer('F')">F</button>
            <button onclick="rotateLayer('F', true)">F'</button>
            <button onclick="rotateLayer('B')">B</button>
            <button onclick="rotateLayer('B', true)">B'</button>
            <button onclick="scramble()" class="primary">🎲 Scramble</button>
            <button onclick="resetCube()">Reset</button>
        </div>
        <div id="status" class="status">Drag to rotate • Scroll to zoom • Click buttons to turn faces</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        // ============== THREE.JS SETUP ==============
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0f23);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(4, 4, 6);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 10, 5);
        scene.add(dirLight);

        // ============== CUBE DATA ==============
        const CUBIE_SIZE = 0.95;
        const colors = {
            U: 0xffffff, // white
            D: 0xf1c40f, // yellow
            L: 0x27ae60, // green
            R: 0x3498db, // blue
            F: 0xe74c3c, // red
            B: 0xe67e22  // orange
        };

        let cubies = [];
        let cubeGroup = new THREE.Group();
        scene.add(cubeGroup);

        function createCubie(x, y, z) {
            const geometry = new THREE.BoxGeometry(CUBIE_SIZE, CUBIE_SIZE, CUBIE_SIZE);
            const materials = [
                new THREE.MeshPhongMaterial({ color: (x === 1) ? colors.R : 0x222222 }), // right
                new THREE.MeshPhongMaterial({ color: (x === -1) ? colors.L : 0x222222 }), // left
                new THREE.MeshPhongMaterial({ color: (y === 1) ? colors.U : 0x222222 }), // up
                new THREE.MeshPhongMaterial({ color: (y === -1) ? colors.D : 0x222222 }), // down
                new THREE.MeshPhongMaterial({ color: (z === 1) ? colors.F : 0x222222 }), // front
                new THREE.MeshPhongMaterial({ color: (z === -1) ? colors.B : 0x222222 })  // back
            ];
            const cubie = new THREE.Mesh(geometry, materials);
            cubie.position.set(x, y, z);
            cubie.userData = { x, y, z };
            cubeGroup.add(cubie);
            cubies.push(cubie);
            return cubie;
        }

        function buildCube() {
            cubies = [];
            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        if (Math.abs(x) + Math.abs(y) + Math.abs(z) > 0) { // skip very center
                            createCubie(x, y, z);
                        }
                    }
                }
            }
        }

        // ============== SIMPLE MOUSE ORBIT ==============
        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;
        let rotationSpeed = 0.005;

        container.addEventListener('mousedown', e => { isDragging = true; previousMouseX = e.clientX; previousMouseY = e.clientY; });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const deltaX = (e.clientX - previousMouseX) * rotationSpeed;
            const deltaY = (e.clientY - previousMouseY) * rotationSpeed;
            cubeGroup.rotation.y += deltaX;
            cubeGroup.rotation.x += deltaY;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        });

        // Zoom with wheel
        container.addEventListener('wheel', e => {
            camera.position.multiplyScalar(1 + e.deltaY * 0.001);
            camera.position.clampLength(3, 12);
        });

        // Resize handler
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============== LAYER ROTATION (basic animated) ==============
        function rotateLayer(face, prime = false) {
            const angle = prime ? -Math.PI / 2 : Math.PI / 2;
            const axis = new THREE.Vector3();
            
            // Determine which cubies belong to this layer
            const layerCubies = [];
            cubies.forEach(cubie => {
                const pos = cubie.userData;
                if (face === 'U' && pos.y === 1) layerCubies.push(cubie);
                else if (face === 'D' && pos.y === -1) layerCubies.push(cubie);
                else if (face === 'L' && pos.x === -1) layerCubies.push(cubie);
                else if (face === 'R' && pos.x === 1) layerCubies.push(cubie);
                else if (face === 'F' && pos.z === 1) layerCubies.push(cubie);
                else if (face === 'B' && pos.z === -1) layerCubies.push(cubie);
            });

            // Temporary group for smooth animation
            const tempGroup = new THREE.Group();
            cubeGroup.add(tempGroup);
            layerCubies.forEach(c => {
                cubeGroup.remove(c);
                tempGroup.add(c);
            });

            // Animate rotation
            let progress = 0;
            const duration = 400; // ms
            const startTime = Date.now();

            function animateTurn() {
                const elapsed = Date.now() - startTime;
                progress = Math.min(elapsed / duration, 1);
                const currentAngle = progress * angle;
                
                if (face === 'U' || face === 'D') tempGroup.rotation.y = currentAngle;
                else if (face === 'L' || face === 'R') tempGroup.rotation.x = currentAngle;
                else if (face === 'F' || face === 'B') tempGroup.rotation.z = currentAngle;

                if (progress < 1) {
                    requestAnimationFrame(animateTurn);
                } else {
                    // Finish rotation and re-attach cubies
                    cubeGroup.remove(tempGroup);
                    layerCubies.forEach(c => cubeGroup.add(c));
                    // Update positions/rotations permanently (simplified - full logic would snap positions)
                    cubeGroup.rotation.set(0, 0, 0); // reset group if needed
                }
                render();
            }
            animateTurn();
        }

        // ============== SCRAMBLE & RESET ==============
        async function scramble() {
            const moves = ['U','D','L','R','F','B'];
            document.getElementById('status').textContent = 'Scrambling...';
            for (let i = 0; i < 20; i++) {
                const face = moves[Math.floor(Math.random() * 6)];
                const prime = Math.random() > 0.5;
                rotateLayer(face, prime);
                await new Promise(r => setTimeout(r, 120));
            }
            document.getElementById('status').textContent = 'Scrambled! Good luck solving it 🎉';
        }

        function resetCube() {
            cubeGroup.rotation.set(0, 0, 0);
            // Rebuild cube (simple reset)
            while (cubeGroup.children.length > 0) cubeGroup.remove(cubeGroup.children[0]);
            buildCube();
            document.getElementById('status').textContent = 'Cube reset';
            setTimeout(() => document.getElementById('status').textContent = 'Ready', 1200);
        }

        function render() {
            renderer.render(scene, camera);
        }

        // ============== INIT ==============
        function init() {
            buildCube();
            function animate() {
                requestAnimationFrame(animate);
                render();
            }
            animate();
        }

        window.onload = init;
    </script>
</body>
</html>
