<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubik's Cube • dougcoburn</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0f23, #1a1a2e);
            font-family: 'Inter', system-ui, sans-serif;
            color: #eee;
        }
        #container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(17, 17, 34, 0.95);
            padding: 15px 20px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 100;
            user-select: none;
        }
        h1 {
            margin: 0 0 10px 0;
            font-size: 1.8rem;
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        button {
            background: #2a2a4a;
            color: white;
            border: none;
            padding: 10px 18px;
            margin: 4px;
            border-radius: 9999px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { background: #3a3a5a; transform: translateY(-1px); }
        .primary { background: linear-gradient(90deg, #4ecdc4, #45b7d1); color: #111; font-weight: 700; }
        .status {
            margin-top: 10px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>
    <div id="container"></div>
    
    <div class="ui">
        <h1>🟥🟧 Rubik's Cube</h1>
        <div style="display:flex;flex-wrap:wrap;gap:6px;max-width:420px;">
            <button onclick="rotateLayer('U')" class="primary">U</button>
            <button onclick="rotateLayer('U', true)">U'</button>
            <button onclick="rotateLayer('D')">D</button>
            <button onclick="rotateLayer('D', true)">D'</button>
            <button onclick="rotateLayer('L')">L</button>
            <button onclick="rotateLayer('L', true)">L'</button>
            <button onclick="rotateLayer('R')">R</button>
            <button onclick="rotateLayer('R', true)">R'</button>
            <button onclick="rotateLayer('F')">F</button>
            <button onclick="rotateLayer('F', true)">F'</button>
            <button onclick="rotateLayer('B')">B</button>
            <button onclick="rotateLayer('B', true)">B'</button>
            <button onclick="scramble()" class="primary">🎲 Scramble</button>
            <button onclick="resetCube()">Reset Cube</button>
            <button onclick="resetView()">Reset View</button>
        </div>
        <div id="status" class="status">Drag to rotate • Scroll to zoom • Buttons to turn faces</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script>
        const container = document.getElementById('container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0f23);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(10, 10, 5);
        scene.add(dirLight);

        // Cube data
        const CUBIE_SIZE = 0.95;
        const colors = { U: 0xffffff, D: 0xf1c40f, L: 0x27ae60, R: 0x3498db, F: 0xe74c3c, B: 0xe67e22 };
        let cubies = [];
        let cubeGroup = new THREE.Group();
        scene.add(cubeGroup);

        function createCubie(x, y, z) {
            const geometry = new THREE.BoxGeometry(CUBIE_SIZE, CUBIE_SIZE, CUBIE_SIZE);
            const materials = [
                new THREE.MeshPhongMaterial({ color: (x === 1) ? colors.R : 0x222222 }),
                new THREE.MeshPhongMaterial({ color: (x === -1) ? colors.L : 0x222222 }),
                new THREE.MeshPhongMaterial({ color: (y === 1) ? colors.U : 0x222222 }),
                new THREE.MeshPhongMaterial({ color: (y === -1) ? colors.D : 0x222222 }),
                new THREE.MeshPhongMaterial({ color: (z === 1) ? colors.F : 0x222222 }),
                new THREE.MeshPhongMaterial({ color: (z === -1) ? colors.B : 0x222222 })
            ];
            const cubie = new THREE.Mesh(geometry, materials);
            cubie.position.set(x, y, z);
            cubie.userData = { x, y, z };
            cubeGroup.add(cubie);
            cubies.push(cubie);
            return cubie;
        }

        function buildCube() {
            cubies = [];
            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        if (Math.abs(x) + Math.abs(y) + Math.abs(z) > 0) {
                            createCubie(x, y, z);
                        }
                    }
                }
            }
        }

        function resetCamera() {
            camera.position.set(5, 5, 8);
            camera.lookAt(0, 0, 0);
        }

        function resetView() {
            cubeGroup.rotation.set(0.35, 0.8, 0);
            resetCamera();
        }

        // Mouse orbit
        let isDragging = false;
        let previousMouseX = 0, previousMouseY = 0;
        const rotationSpeed = 0.005;

        container.addEventListener('mousedown', e => { isDragging = true; previousMouseX = e.clientX; previousMouseY = e.clientY; });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', e => {
            if (!isDragging) return;
            const deltaX = (e.clientX - previousMouseX) * rotationSpeed;
            const deltaY = (e.clientY - previousMouseY) * rotationSpeed;
            cubeGroup.rotation.y += deltaX;
            cubeGroup.rotation.x += deltaY;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        });

        // Zoom
        container.addEventListener('wheel', e => {
            camera.position.multiplyScalar(1 + e.deltaY * 0.001);
            camera.position.clampLength(4, 15);
            camera.lookAt(0, 0, 0);
        });

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // FIXED: Layer rotation that actually persists
        function rotateLayer(face, prime = false) {
            const direction = prime ? -1 : 1;
            const angle = direction * Math.PI / 2;

            const layerCubies = cubies.filter(cubie => {
                const p = cubie.userData;
                if (face === 'U' && p.y === 1) return true;
                if (face === 'D' && p.y === -1) return true;
                if (face === 'L' && p.x === -1) return true;
                if (face === 'R' && p.x === 1) return true;
                if (face === 'F' && p.z === 1) return true;
                if (face === 'B' && p.z === -1) return true;
                return false;
            });

            const tempGroup = new THREE.Group();
            cubeGroup.add(tempGroup);

            layerCubies.forEach(c => {
                cubeGroup.remove(c);
                tempGroup.add(c);
            });

            let progress = 0;
            const duration = 380;
            const startTime = Date.now();

            function animateTurn() {
                const elapsed = Date.now() - startTime;
                progress = Math.min(elapsed / duration, 1);
                const currentAngle = progress * angle;

                if (face === 'U' || face === 'D') tempGroup.rotation.y = currentAngle;
                else if (face === 'L' || face === 'R') tempGroup.rotation.x = currentAngle;
                else if (face === 'F' || face === 'B') tempGroup.rotation.z = currentAngle;

                if (progress < 1) {
                    requestAnimationFrame(animateTurn);
                } else {
                    // === PERMANENTLY APPLY THE ROTATION ===
                    const finalMatrix = tempGroup.matrix.clone();
                    layerCubies.forEach(cubie => {
                        cubie.applyMatrix4(finalMatrix);
                        // Snap back to exact grid positions
                        cubie.position.x = Math.round(cubie.position.x);
                        cubie.position.y = Math.round(cubie.position.y);
                        cubie.position.z = Math.round(cubie.position.z);
                        // Update logical position for future turns
                        cubie.userData.x = cubie.position.x;
                        cubie.userData.y = cubie.position.y;
                        cubie.userData.z = cubie.position.z;
                    });

                    cubeGroup.remove(tempGroup);
                    layerCubies.forEach(cubie => cubeGroup.add(cubie));
                }
                render();
            }
            animateTurn();
        }

        // Scramble & Reset
        async function scramble() {
            const moves = ['U','D','L','R','F','B'];
            document.getElementById('status').textContent = 'Scrambling...';
            for (let i = 0; i < 20; i++) {
                const face = moves[Math.floor(Math.random() * 6)];
                const prime = Math.random() > 0.5;
                rotateLayer(face, prime);
                await new Promise(r => setTimeout(r, 110));
            }
            document.getElementById('status').textContent = 'Scrambled! Good luck 🎉';
        }

        function resetCube() {
            while (cubeGroup.children.length) cubeGroup.remove(cubeGroup.children[0]);
            buildCube();
            cubeGroup.rotation.set(0.35, 0.8, 0);
            document.getElementById('status').textContent = 'Cube reset';
            setTimeout(() => document.getElementById('status').textContent = 'Ready', 1400);
        }

        function render() {
            renderer.render(scene, camera);
        }

        function init() {
            buildCube();
            resetCamera();
            cubeGroup.rotation.set(0.35, 0.8, 0);
            function animate() {
                requestAnimationFrame(animate);
                render();
            }
            animate();
        }

        window.onload = init;
    </script>
</body>
</html>
